# example-workspace.yaml
# Copy to .flotilla/workspace.yaml in your repo to customise
# the workspace layout created by flotilla (works with cmux and zellij).
#
# Variables substituted at workspace creation time:
#   {main_command}  — determined by picker selection
#   {branch}        — the git branch name
#   {repo}          — the repository directory name
#   {issue_number}  — GitHub issue number (if applicable)
#   {session_id}    — web session UUID   (if applicable)

# What terminal sessions to create
content:
  - role: main
    command: "{main_command}"
  - role: ai
    command: codex
  - role: shell
    command: ""

# How to arrange them in the workspace
layout:
  - slot: main
    focus: true
  - slot: ai
    split: right
  - slot: shell
    split: down
    parent: ai
