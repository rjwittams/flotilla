apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: convoys.flotilla.work
spec:
  group: flotilla.work
  scope: Namespaced
  names:
    plural: convoys
    singular: convoy
    kind: Convoy
  versions:
