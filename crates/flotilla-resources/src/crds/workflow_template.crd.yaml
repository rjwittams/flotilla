apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: workflowtemplates.flotilla.work
spec:
  group: flotilla.work
  scope: Namespaced
  names:
    plural: workflowtemplates
    singular: workflowtemplate
    kind: WorkflowTemplate
    shortNames:
      - wft
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - tasks
              properties:
                inputs:
                  type: array
                  items:
                    type: object
                    required:
                      - name
                    properties:
                      name:
                        type: string
                        minLength: 1
                      description:
                        type: string
                tasks:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required:
                      - name
                      - processes
                    properties:
                      name:
                        type: string
                        minLength: 1
                      depends_on:
                        type: array
                        items:
                          type: string
                      processes:
                        type: array
                        minItems: 1
                        items:
                          type: object
                          required:
                            - role
                          properties:
                            role:
                              type: string
                              minLength: 1
                            selector:
                              type: object
                              required:
                                - capability
                              properties:
                                capability:
                                  type: string
                                  minLength: 1
                            prompt:
                              type: string
                            command:
                              type: string
                          oneOf:
                            - required:
                                - selector
                              not:
                                required:
                                  - command
                            - required:
                                - command
                              not:
                                anyOf:
                                  - required:
                                      - selector
                                  - required:
                                      - prompt
