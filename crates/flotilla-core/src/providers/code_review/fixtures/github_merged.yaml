n"}},"_links":{"self":{"href":"https://api.github.com/repos/rjwittams/flotilla/pulls/28"},"html":{"href":"https://github.com/rjwittams/flotilla/pull/28"},"issue":{"href":"https://api.github.com/repos/rjwittams/flotilla/issues/28"},"comments":{"href":"https://api.github.com/repos/rjwittams/flotilla/issues/28/comments"},"review_comments":{"href":"https://api.github.com/repos/rjwittams/flotilla/pulls/28/comments"},"review_comment":{"href":"https://api.github.com/repos/rjwittams/flotilla/pulls/comments{/number}"},"commits":{"href":"https://api.github.com/repos/rjwittams/flotilla/pulls/28/commits"},"statuses":{"href":"https://api.github.com/repos/rjwittams/flotilla/statuses/2accec3ba1b671c671a740dea00c578453aefcc7"}},"author_association":"OWNER","auto_merge":null,"assignee":null,"active_lock_reason":null},{"url":"https://api.github.com/repos/rjwittams/flotilla/pulls/19","id":3360551143,"node_id":"PR_kwDORel_087ITfDn","html_url":"https://github.com/rjwittams/flotilla/pull/19","diff_url":"https://github.com/rjwittams/flotilla/pull/19.diff","patch_url":"https://github.com/rjwittams/flotilla/pull/19.patch","issue_url":"https://api.github.com/repos/rjwittams/flotilla/issues/19","number":19,"state":"closed","locked":false,"title":"feat: GitHub API ETag caching to prevent rate limiting","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"body":"## Summary\n\n- Adds `GhApiClient` that wraps `gh api --include` with ETag-based conditional request caching\n- Switches `GitHubIssueTracker` and `GitHubCodeReview` from `gh issue/pr list` to REST API endpoints via `GhApiClient`\n- On subsequent refreshes, sends `If-None-Match` headers — GitHub returns 304 Not Modified when data hasn''t changed, which **doesn''t count against rate limits**\n- Guards provider construction on repo slug availability (logs warning and skips if unavailable)\n\n**Rate limit impact:** ~1,080 API calls/hr/repo → ~3 initial calls then free (304s don''t count). Verified with live test.\n\n## Changes\n\n| File | What |\n|------|------|\n| `src/providers/github_api.rs` | New `GhApiClient` with ETag cache + response parser |\n| `src/providers/issue_tracker/github.rs` | Uses REST `/repos/{owner}/{repo}/issues`, filters out PRs |\n| `src/providers/code_review/github.rs` | Uses REST `/repos/{owner}/{repo}/pulls`, handles merged via `merged_at` |\n| `src/providers/discovery.rs` | Creates shared `GhApiClient`, extracts repo slug, guards on availability |\n| `src/providers/mod.rs` | Adds `pub mod github_api` |\n\n## Test plan\n\n- [x] 23 unit tests pass (`cargo test`)\n- [x] Clippy clean (only benign `status` field warning)\n- [x] Live tested: ran against real repo for 25s, confirmed ETag caching works (3 initial API calls, subsequent cycles free)\n- [x] Verified 304 responses don''t increment rate limit counter\n\n🤖 Generated with [Claude Code](https://claude.com/claude-code)","created_at":"2026-03-05T19:42:37Z","updated_at":"2026-03-09T12:24:01Z","closed_at":"2026-03-06T12:21:44Z","merged_at":"2026-03-06T12:21:43Z","merge_commit_sha":"4d2832b1c0d02d110fac5d17565c94357af041b9","assignees":[],"requested