urce_index`\n- **Selection** persists across refresh via `WorkItemIdentity` enum (fixes C3: selection drift)\n- **Change detection** uses `PartialEq` on `ProviderData` instead of length-only comparison (fixes C4: missed content changes)\n- **Multi-select** check in render is O(1) via `HashSet<WorkItemIdentity>` (fixes P1: O(n²) lookup)\n- **Issue linking** is O(1) by key (fixes P2: linear search)\n- **Multi-checkout** keeps first checkout in correlation group, not last (fixes C1: silent merge)\n\n## Test Plan\n\n- [x] All 31 tests pass (27 existing + 4 new identity tests)\n- [x] `cargo clippy` clean\n- [ ] Manual verification: selection persists across refresh\n- [ ] Manual verification: unseen-change badge fires on content changes\n- [ ] Manual verification: multi-select works correctly\n\n🤖 Generated with [Claude Code](https://claude.com/claude-code)","created_at":"2026-03-06T15:14:39Z","updated_at":"2026-03-09T12:24:02Z","closed_at":"2026-03-06T15:29:18Z","merged_at":"2026-03-06T15:29:18Z","merge_commit_sha":"6b52a53665a4fefc802978aa2d17a7c1ed013044","assignees":[],"requested_reviewers":[],"requested_teams":[],"labels":[],"milestone":null,"draft":false,"commits_url":"https://api.github.com/repos/rjwittams/flotilla/pulls/28/commits","review_comments_url":"https://api.github.com/repos/rjwittams/flotilla/pulls/28/comments","review_comment_url":"https://api.github.com/repos/rjwittams/flotilla/pulls/comments{/number}","comments_url":"https://api.github.com/repos/rjwittams/flotilla/issues/28/comments","statuses_url":"https://api.github.com/repos/rjwittams/flotilla/statuses/2accec3ba1b671c671a740dea00c578453aefcc7","head":{"label":"rjwittams:key-based-provider-data-model","ref":"key-based-provider-data-model","sha":"2accec3ba1b671c671a740dea00c578453aefcc7","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"h