:false,"assignees":[],"milestone":null,"comments":0,"created_at":"2026-03-07T05:10:27Z","updated_at":"2026-03-07T05:10:27Z","closed_at":null,"assignee":null,"author_association":"OWNER","active_lock_reason":null,"sub_issues_summary":{"total":0,"completed":0,"percent_completed":0},"issue_dependencies_summary":{"blocked_by":0,"total_blocked_by":0,"blocking":0,"total_blocking":0},"body":"From PR #100 code review (internal and bot).\n\nThe idle timeout watcher polls every 500ms. When it detects zero clients, it sleeps for the full timeout duration, then rechecks. If a client connects and disconnects during that sleep, the timer is not reset — the daemon may shut down earlier than expected.\n\nA \\`tokio::sync::Notify\\` or \\`watch\\` channel signaled on client count changes would be more robust and eliminate the polling overhead.\n\n**Context:** The current behavior is acceptable for practical use (worst case: daemon shuts down slightly early on rapid connect-disconnect). Worth improving for correctness.","closed_by":null,"reactions":{"url":"https://api.github.com/repos/rjwittams/flotilla/issues/105/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/rjwittams/flotilla/issues/105/timeline","performed_via_github_app":null,"state_reason":null,"pinned_comment":null},{"url":"https://api.github.com/repos/rjwittams/flotilla/issues/103","repository_url":"https://api.github.com/repos/rjwittams/flotilla","labels_url":"https://api.github.com/repos/rjwittams/flotilla/issues/103/labels{/name}","comments_url":"https://api.github.com/repos/rjwittams/flotilla/issues/103/comments","events_url":"https://api.github.com/repos/rjwittams/flotilla/issues/103/events","html_url":"https://github.com/rjwittams/flotilla/issues/103","id":4037408696,"node_id":"I_kwDORel_087wpfe4","number":103,"title":"Decouple integration test from flotilla-tui","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"labels":[{"id":10347495064,"node_id":"LA_kwDORel_088AAAACaMI-mA","url":"https://api.github.com/repos/rjwittams/flotilla/labels/from-review","name":"from-review","color":"BFD4F2","default":false,"description":"Issue filed from PR review feedback"}],"state":"open","locked":false,"assignees":[],"milestone":null,"comments":0,"created_at":"2026-03-07T05:10:03Z","updated_at":"2026-03-07T05:10:03Z","closed_at":null,"assignee":null,"author_association":"OWNER","active_lock_reason":null,"sub_issues_summary":{"total":0,"completed":0,"percent_completed":0},"issue_dependencies_summary":{"blocked_by":0,"total_blocked_by":0,"blocking":0,"total_blocking":0},"body":"From PR #100 review by claude-review bot.\n\nThe socket round-trip integration test in `flotilla-daemon` uses `flotilla_tui::socket::SocketDaemon` as the test client, creating a dev-dependency from daemon to TUI. A thin raw-socket test client written inline would be more robust and avoid coupling server tests to the client implementation.\n\n**Context:** Not a blocker, but worth addressing as the test suite grows.","closed_by":null,"reactions":{"url":"https://api.github.com/repos/rjwittams/flotilla/issues/103/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/rjwittams/flotilla/issues/103/timeline","performed_via_github_app":null,"state_reason":null,"pinned_comment":null},{"url":"https://api.github.com/repos/rjwittams/flotilla/issues/101","repository_url":"https://api.github.com/repos/rjwittams/flotilla","labels_url":"https://api.github.com/repos/rjwittams/flotilla/issues/101/labels{/name}","comments_url":"https://api.github.com/repos/rjwittams/flotilla/issues/101/comments","events_url":"https://api.github.com/repos/rjwittams/flotilla/issues/101/events","html_url":"https://github.com/rjwittams/flotilla/issues/101","id":4037364383,"node_id":"I_kwDORel_087wpUqf","number":101,"title":"bug: llvm-cov SIGSEGV with branch coverage caused by async_trait desugaring","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"labels":[{"id":10364863952,"node_id":"LA_kwDORel_088AAAACactF0A","url":"https://api.github.com/repos/rjwittams/flotilla/labels/infrastructure","name":"infrastructure","color":"5319E7","default":false,"description":"Build, CI, and tooling"}],"state":"open","locked":false,"assignees":[],"milestone":null,"comments":0,"created_at":"2026-03-07T04:50:51Z","updated_at":"2026-03-07T04:50:51Z","closed_at":null,"assignee":null,"author_association":"OWNER","active_lock_reason":null,"sub_issues_summary":{"total":0,"completed":0,"percent_completed":0},"issue_dependencies_summary":{"blocked_by":0,"total_blocked_by":0,"blocking":0,"total_blocking":0},"body":"## Summary\n\n`llvm-cov show -show-branches=count` crashes with SIGSEGV when processing Rust code compiled with `-Z coverage-options=branch` that uses the `async_trait` crate. The crash is in `llvm::coverage::CoverageMapping::getInstantiationGroups`.\n\nThis is the root cause behind #94 (branch coverage disabled in CI).\n\n## Minimal reproduction\n\n**15 lines of Rust:**\n\n```toml\n# Cargo.toml\n[package]\nname = \"repro\"\nversion = \"0.1.0\"\nedition = \"2021\"\n[dependencies]\nasync-trait = \"0.1\"\n```\n\n```rust\n// src/lib.rs\nuse async_trait::async_trait;\n\n#[async_trait]\ntrait T {\n    async fn f(&self) -> i32;\n}\n\nstruct S;\n\n#[async_trait]\nimpl T for S {\n    async fn f(&self) -> i32 {\n        if true { 1 } else { 0 }\n    }\n}\n```\n\n```bash\ncargo +nightly llvm-cov --html --branch\n# => signal: 11 (SIGSEGV)\n```\n\nA copy of this repro crate is in `bisect-llvm-crash/` in the repo root (not part of the workspace).\n\n## Environment\n\n- rustc 1.96.0-nightly (69370dc4a 2026-03-05)\n- LLVM 22.1.0\n- aarch64-apple-darwin\n- async-trait 0.1.89\n- cargo-llvm-cov 0.6.16\n\n## Root cause\n\n`async_trait` desugars `async fn` into a method returning `Pin<Box<dyn Future + Send + ''_>>`. When this desugared code is compiled with `-Z coverage-options=branch`, the LLVM coverage instrumentation emits branch coverage data that causes `llvm-cov show -show-branches=count` to crash in `getInstantiationGroups()`.\n\n### What crashes\n\n- Any `if`, `if let`, `match`, or other branch inside an `#[async_trait]` method\n\n### What does NOT crash\n\n| Variant | Result |\n|---------|--------|\n| `#[async_trait]` method with no branches (just `42`) | PASS |\n| Native async trait (`async fn` in trait, no macro) | PASS |\n| Inherent async method (not in a trait impl) | PASS |\n| Same code without `--branch` / `-show-branches=count` | PASS |\n\n## Impact on flotilla\n\nEvery provider trait (`Vcs`, `CodeReview`, `CodingAgent`, `IssueTracker`, `AiUtility`, `WorkspaceManager`) and `DaemonHandle` uses `#[async_trait]` for dyn-compatibility. This means branch coverage is unavailable for the entire codebase as long as these traits exist.\n\n## Workarounds\n\n1. **Current:** `--branch` is disabled in CI (see #94)\n2. **Migrate to native async traits** — would require giving up `dyn Trait` or using `trait_variant::make` / manual erased wrappers\n3. **Wait for upstream fix** — this is an LLVM bug in the coverage report renderer\n\n## Upstream reporting\n\nThis should be reported to:\n- **LLVM:** https://github.com/llvm/llvm-project/issues — SIGSEGV in `llvm-cov show` with `-show-branches=count`\n- **Rust:** https://github.com/rust-lang/rust/issues — branch coverage + `async_trait` interaction (the coverage instrumentation emitted by rustc is what confuses llvm-cov)\n- **cargo-llvm-cov:** https://github.com/taiki-e/cargo-llvm-cov/issues — for awareness, though the bug is in LLVM itself\n\nThe repro is pure Rust + one dependency (`async_trait`) and does not require flotilla.\n\n## Bisection notes\n\nThe crash was bisected from the full `flotilla-core` crate (8000+ lines) down to 15 lines through systematic module-level, file-level, function-level, and line-level elimination. The crash exists in multiple independent locations throughout the codebase — anywhere `#[async_trait]` methods contain branches.","closed_by":null,"reactions":{"url":"https://api.github.com/repos/rjwittams/flotilla/issues/101/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/rjwittams/flotilla/issues/101/timeline","performed_via_github_app":null,"state_reason":null,"pinned_comment":null},{"url":"https://api.github.com/repos/rjwittams/flotilla/issues/97","repository_url":"https://api.github.com/repos/rjwittams/flotilla","labels_url":"https://api.github.com/repos/rjwittams/flotilla/issues/97/labels{/name}","comments_url":"https://api.github.com/repos/rjwittams/flotilla/issues/97/comments","events_url":"https://api.github.com/repos/rjwittams/flotilla/issues/97/events","html_url":"https://github.com/rjwittams/flotilla/issues/97","id":4037027099,"node_id":"I_kwDORel_087woCUb","number":97,"title":"tracking: test coverage improvement roadmap (34% → 71%+)","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"labels":[{"id":10364863894,"node_id":"LA_kwDORel_088AAAACactFlg","url":"https://api.github.com/repos/rjwittams/flotilla/labels/testing","name":"testing","color":"1D76DB","default":false,"description":"Test coverage and testing infrastructure"}],"state":"open","locked":false,"assignees":[],"milestone":null,"comments":1,"created_at":"2026-03-07T02:19:23Z","updated_at":"2026-03-09T01:41:48Z","closed_at":null,"assignee":null,"author_association":"OWNER","active_lock_reason":null,"sub_issues_summary":{"total":0,"completed":0,"percent_completed":0},"issue_dependencies_summary":{"blocked_by":0,"total_blocked_by":0,"blocking":0,"total_blocking":0},"body":"## Current State\n\n**Overall: 34.6% line coverage, 32.3% function coverage** (before Phase 2 merge — will increase on next coverage run)\n\nCoverage report: https://rjwittams.github.io/flotilla/coverage/\n\n### Coverage by file\n\n| File | Lines | Coverage | Status |\n|------|-------|----------|--------|\n| correlation.rs | 322 | 98.5% | ✅ Excellent |\n| convert.rs | 116 | 97.4% | ✅ Excellent |\n| protocol/lib.rs | 138 | 96.4% | ✅ Excellent |\n| in_process.rs | 89 | 91.0% | ✅ Good |\n| git_worktree.rs | 297 | 89.9% | ✅ Good |\n| refresh.rs | 234 | 78.6% | 🟡 Good |\n| model.rs | 90 | 60.0% | 🟡 Fair |\n| discovery.rs | 157 | 59.2% | 🟡 Fair |\n| data.rs | 643 | 45.6% | 🟠 Needs work |\n| config.rs | 132 | 31.1% | 🟠 Needs work |\n| executor.rs | 258 | 0% | 🔴 No tests |\n| *TUI layer* | ~2700 | 0% | 🔴 No tests |\n| *CLI providers* | ~1500 | 0% | 🔴 No tests |\n\n### Branch coverage\n\nDisabled due to nightly llvm-cov SIGSEGV (#94).\n\n---\n\n## Roadmap\n\n### Phase 1: Prerequisites (infrastructure)\n\n| Issue | Description | Status |\n|-------|-------------|--------|\n| #73 | CommandRunner trait for mockable CLI providers | ✅ Done |\n| #74 | GhApiClient trait for mockable GitHub providers | Open |\n| #75 | Split app/mod.rs (1094 lines) | Open |\n| #76 | Extract testable helpers from ui.rs | Open |\n| #77 | Make config base path injectable | Open |\n\n### Phase 2: Easy wins (no prerequisites, pure logic) — ✅ Complete\n\nAll merged in PR #98. Added 181 tests (initially 271, consolidated to remove redundancy).\n\n| Issue | Description | Tests | Status |\n|-------|-------------|-------|--------|\n| #78 | intent.rs tests | 57 | ✅ Closed |\n| #79 | event_log.rs tests | 25 | ✅ Closed |\n| #80 | ui_state.rs tests | 12 | ✅ Closed |\n| #81 | template.rs tests | 16 | ✅ Closed |\n| #93 | protocol types tests | 74 | ✅ Closed |\n| #85 | model.rs tests | 10 | ✅ Closed |\n\n### Phase 3: Medium effort (some mocking)\n\n| Issue | Description | Depends on |\n|-------|-------------|------------|\n| #82 | data.rs coverage increase | — |\n| #83 | executor.rs tests | #73, #74 |\n| #84 | config.rs full coverage | #77 |\n| #86 | discovery.rs coverage | #73 |\n| #87 | TUI executor tests | — |\n| #88 | refresh.rs edge cases | — |\n\n### Phase 4: Hard (external tools, platform-specific)\n\n| Issue | Description | Depends on |\n|-------|-------------|------------|\n| #89 | git.rs + wt.rs provider tests | #73 |\n| #90 | GitHub provider tests | #74 |\n| #91 | Extend tmux/zellij tests | #73 |\n| #92 | coding_agent/claude.rs | #73 + HTTP mock |\n| #96 | TUI rendering snapshot tests | #76 |\n\n### Phase 5: CI improvements\n\n| Issue | Description |\n|-------|-------------|\n| #94 | Track upstream llvm-cov branch coverage fix |\n| #95 | macOS coverage runner (low priority) |\n\n---\n\n## Strategy decisions\n\n**Mocking over platform runners**: The CommandRunner trait (#73) is the single most impactful prerequisite — it unblocks testing for all CLI-dependent providers without requiring those tools to be installed.\n\n**Easy wins first**: Phase 2 issues require zero infrastructure changes and can add ~1000 lines of pure-logic test coverage immediately.\n\n**TUI approach**: Extract and test pure logic (intents, event log, state). Use TestBackend snapshot tests sparingly for rendering. Don''t try to achieve high coverage on terminal-dependent code.","closed_by":null,"reactions":{"url":"https://api.github.com/repos/rjwittams/flotilla/issues/97/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/rjwittams/flotilla/issues/97/timeline","performed_via_github_app":null,"state_reason":null,"pinned_comment":null},{"url":"https://api.github.com/repos/rjwittams/flotilla/issues/96","repository_url":"https://api.github.com/repos/rjwittams/flotilla","labels_url":"https://api.github.com/repos/rjwittams/flotilla/issues/96/labels{/name}","comments_url":"https://api.github.com/repos/rjwittams/flotilla/issues/96/comments","events_url":"https://api.github.com/repos/rjwittams/flotilla/issues/96/events","html_url":"https://github.com/rjwittams/flotilla/issues/96","id":4037025039,"node_id":"I_kwDORel_087woB0P","number":96,"title":"test: TUI rendering snapshot tests with ratatui TestBackend","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"labels":[{"id":10364863894,"node_id":"LA_kwDORel_088AAAACactFlg","url":"https://api.github.com/repos/rjwittams/flotilla/labels/testing","name":"testing","color":"1D76DB","default":false,"description":"Test coverage and testing infrastructure"}],"state":"open","locked":false,"assignees":[],"milestone":null,"comments":0,"created_at":"2026-03-07T02:18:37Z","updated_at":"2026-03-07T02:18:37Z","closed_at":null,"assignee":null,"author_association":"OWNER","active_lock_reason":null,"sub_issues_summary":{"total":0,"completed":0,"percent_completed":0},"issue_dependencies_summary":{"blocked_by":0,"total_blocked_by":0,"blocking":0,"total_blocking":0},"body":"## Context\n\n\\`crates/flotilla-tui/src/ui.rs\\` (1094 lines) has **0% test coverage**. It''s all ratatui rendering code. While most rendering logic is hard to unit test, ratatui provides a \\`TestBackend\\` that can capture rendered output for snapshot testing.\n\n## Approach\n\nUse \\`ratatui::backend::TestBackend\\` to render into a buffer, then assert on the buffer contents:\n\n\\`\\`\\`rust\n#[test]\nfn render_empty_table() {\n    let backend = TestBackend::new(80, 24);\n    let mut terminal = Terminal::new(backend).unwrap();\n    let app = App::new(/* test fixture */);\n    terminal.draw(|f| render(f, &app, &mut ui_state)).unwrap();\n    // Assert on terminal.backend().buffer()\n}\n\\`\\`\\`\n\n## What to test\n\n- Empty state renders without panic\n- Tab bar shows correct repo names\n- Status bar shows mode-appropriate hints\n- Action menu popup positioned correctly\n- Help screen contains all keybindings\n- Table renders correct number of rows\n- Preview panel shows selected item details\n\n## Considerations\n\n- Snapshot tests are brittle to layout changes — use sparingly\n- Focus on \\\"doesn''t crash\\\" and structural assertions over exact pixel matching\n- \\`insta\\` crate can manage snapshot expectations\n\n## Prerequisites\n\n- #76 (extract pure helpers) — test the pure parts separately, use snapshots for integration\n\n## Difficulty\n\n**Hard** — requires test fixture construction and snapshot management.","closed_by":null,"reactions":{"url":"https://api.github.com/repos/rjwittams/flotilla/issues/96/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/rjwittams/flotilla/issues/96/timeline","performed_via_github_app":null,"state_reason":null,"pinned_comment":null},{"url":"https://api.github.com/repos/rjwittams/flotilla/issues/95","repository_url":"https://api.github.com/repos/rjwittams/flotilla","labels_url":"https://api.github.com/repos/rjwittams/flotilla/issues/95/labels{/name}","comments_url":"https://api.github.com/repos/rjwittams/flotilla/issues/95/comments","events_url":"https://api.github.com/repos/rjwittams/flotilla/issues/95/events","html_url":"https://github.com/rjwittams/flotilla/issues/95","id":4037023700,"node_id":"I_kwDORel_087woBfU","number":95,"title":"ci: add macOS coverage runner for platform-specific tests","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"labels":[{"id":10364863894,"node_id":"LA_kwDORel_088AAAACactFlg","url":"https://api.github.com/repos/rjwittams/flotilla/labels/testing","name":"testing","color":"1D76DB","default":false,"description":"Test coverage and testing infrastructure"},{"id":10364863952,"node_id":"LA_kwDORel_088AAAACactF0A","url":"https://api.github.com/repos/rjwittams/flotilla/labels/infrastructure","name":"infrastructure","color":"5319E7","default":false,"description":"Build, CI, and tooling"}],"state":"open","locked":false,"assignees":[],"milestone":null,"comments":0,"created_at":"2026-03-07T02:18:13Z","updated_at":"2026-03-07T02:18:13Z","closed_at":null,"assignee":null,"author_association":"OWNER","active_lock_reason":null,"sub_issues_summary":{"total":0,"completed":0,"percent_completed":0},"issue_dependencies_summary":{"blocked_by":0,"total_blocked_by":0,"blocking":0,"total_blocking":0},"body":"## Context\n\nCurrent CI runs only on \\`ubuntu-latest\\`. Several providers are macOS-specific:\n- \\`cmux.rs\\` — hardcodes \\`/Applications/cmux.app/...\\`\n- \\`claude.rs\\` — uses macOS \\`security\\` CLI for keychain\n\n## Proposal\n\nAdd a macOS job to the coverage workflow (or a separate integration-test workflow):\n\n\\`\\`\\`yaml\ntest-macos:\n  runs-on: macos-latest\n  steps:\n    - uses: actions/checkout@v4\n    - uses: dtolnay/rust-toolchain@nightly\n      with:\n        components: llvm-tools-preview\n    - uses: taiki-e/install-action@cargo-llvm-cov\n    - run: cargo +nightly llvm-cov --workspace --json --locked --output-path macos-coverage.json\n    - uses: actions/upload-artifact@v4\n      with:\n        name: macos-coverage\n        path: macos-coverage.json\n\\`\\`\\`\n\n## Coverage merging\n\n\\`cargo-llvm-cov\\` supports merging profdata from multiple runs. A merge job could combine Ubuntu + macOS coverage into a unified report.\n\n## Considerations\n\n- macOS runners cost 10x Linux minutes on GitHub Actions\n- Only worth it once there are macOS-specific integration tests to run\n- Mock-based tests (#73) reduce the need for this\n\n## Priority\n\n**Low** — focus on mock-based testing first. Add macOS runner when integration tests justify the cost.","closed_by":null,"reactions":{"url":"https://api.github.com/repos/rjwittams/flotilla/issues/95/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/rjwittams/flotilla/issues/95/timeline","performed_via_github_app":null,"state_reason":null,"pinned_comment":null},{"url":"https://api.github.com/repos/rjwittams/flotilla/issues/94","repository_url":"https://api.github.com/repos/rjwittams/flotilla","labels_url":"https://api.github.com/repos/rjwittams/flotilla/issues/94/labels{/name}","comments_url":"https://api.github.com/repos/rjwittams/flotilla/issues/94/comments","events_url":"https://api.github.com/repos/rjwittams/flotilla/issues/94/events","html_url":"https://github.com/rjwittams/flotilla/issues/94","id":4037023637,"node_id":"I_kwDORel_087woBeV","number":94,"title":"ci: track upstream llvm-cov branch coverage fix","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"labels":[{"id":10364863952,"node_id":"LA_kwDORel_088AAAACactF0A","url":"https://api.github.com/repos/rjwittams/flotilla/labels/infrastructure","name":"infrastructure","color":"5319E7","default":false,"description":"Build, CI, and tooling"}],"state":"open","locked":false,"assignees":[],"milestone":null,"comments":0,"created_at":"2026-03-07T02:18:11Z","updated_at":"2026-03-07T02:18:11Z","closed_at":null,"assignee":null,"author_association":"OWNER","active_lock_reason":null,"sub_issues_summary":{"total":0,"completed":0,"percent_completed":0},"issue_dependencies_summary":{"blocked_by":0,"total_blocked_by":0,"blocking":0,"total_blocking":0},"body":"## Context\n\nBranch coverage is disabled in the coverage workflow because \\`--branch\\` causes a SIGSEGV in nightly llvm-cov''s \\`--show-mcdc\\` pass. The coverage report currently shows 0 branches for all files.\n\n## Current workaround\n\n\\`coverage.yml\\` has a comment:\n\\`\\`\\`yaml\n# NOTE: --branch crashes llvm-cov (SIGSEGV from --show-mcdc in nightly LLVM).\n# Revisit when upstream is fixed.\n\\`\\`\\`\n\n## Action items\n\n- [ ] Periodically check if nightly llvm-cov has fixed the SIGSEGV\n- [ ] When fixed, re-enable \\`--branch\\` flag in coverage workflow\n- [ ] Consider pinning a specific nightly version that works\n\n## Links\n\nTrack relevant LLVM/Rust issues for the \\`--show-mcdc\\` crash.","closed_by":null,"reactions":{"url":"https://api.github.com/repos/rjwittams/flotilla/issues/94/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/rjwittams/flotilla/issues/94/timeline","performed_via_github_app":null,"state_reason":null,"pinned_comment":null},{"url":"https://api.github.com/repos/rjwittams/flotilla/issues/92","repository_url":"https://api.github.com/repos/rjwittams/flotilla","labels_url":"https://api.github.com/repos/rjwittams/flotilla/issues/92/labels{/name}","comments_url":"https://api.github.com/repos/rjwittams/flotilla/issues/92/comments","events_url":"https://api.github.com/repos/rjwittams/flotilla/issues/92/events","html_url":"https://github.com/rjwittams/flotilla/issues/92","id":4037022654,"node_id":"I_kwDORel_087woBO-","number":92,"title":"test: coding_agent/claude.rs (HTTP mock, auth flow)","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"labels":[{"id":10364863894,"node_id":"LA_kwDORel_088AAAACactFlg","url":"https://api.github.com/repos/rjwittams/flotilla/labels/testing","name":"testing","color":"1D76DB","default":false,"description":"Test coverage and testing infrastructure"}],"state":"open","locked":false,"assignees":[],"milestone":null,"comments":0,"created_at":"2026-03-07T02:17:43Z","updated_at":"2026-03-07T02:17:43Z","closed_at":null,"assignee":null,"author_association":"OWNER","active_lock_reason":null,"sub_issues_summary":{"total":0,"completed":0,"percent_completed":0},"issue_dependencies_summary":{"blocked_by":0,"total_blocked_by":0,"blocking":0,"total_blocking":0},"body":"## Context\n\n\\`providers/coding_agent/claude.rs\\` (385 lines) has **0% coverage** and is the hardest provider to test:\n- macOS \\`security\\` CLI for keychain access\n- \\`reqwest::Client\\` for Anthropic API (sessions endpoint)\n- Global auth cache (\\`LazyLock<Mutex<...>>\\`)\n- OAuth token refresh flow\n\n## Prerequisites\n\n- #73 (CommandRunner trait) — for mocking \\`security\\` CLI\n- HTTP client abstraction or mock server\n\n## Approach options\n\n### Option A: Trait-based HTTP client\nExtract an \\`HttpClient\\` trait, inject into the provider. Mock in tests.\n\n### Option B: Mock HTTP server\nUse \\`wiremock\\` or \\`mockito\\` to spin up a local server, point the client at it.\n\n### Option C: Integration test with feature flag\n\\`#[cfg(feature = \"integration-tests\")]\\` — run against real API with test credentials in CI.\n\n## What to test\n\n- Session listing and parsing\n- Session status transitions  \n- Auth token acquisition (keychain → OAuth → cached)\n- Token refresh on expiry\n- API error handling (401, 429, 500)\n- Rate limiting behavior\n\n## Difficulty\n\n**Hard** — needs HTTP mock infrastructure and auth cache isolation. Consider starting with Option B (mock server) for the API parsing tests.","closed_by":null,"reactions":{"url":"https://api.github.com/repos/rjwittams/flotilla/issues/92/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/rjwittams/flotilla/issues/92/timeline","performed_via_github_app":null,"state_reason":null,"pinned_comment":null},{"url":"https://api.github.com/repos/rjwittams/flotilla/issues/91","repository_url":"https://api.github.com/repos/rjwittams/flotilla","labels_url":"https://api.github.com/repos/rjwittams/flotilla/issues/91/labels{/name}","comments_url":"https://api.github.com/repos/rjwittams/flotilla/issues/91/comments","events_url":"https://api.github.com/repos/rjwittams/flotilla/issues/91/events","html_url":"https://github.com/rjwittams/flotilla/issues/91","id":4037022419,"node_id":"I_kwDORel_087woBLT","number":91,"title":"test: extend tmux.rs and zellij.rs workspace tests","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"labels":[{"id":10364863894,"node_id":"LA_kwDORel_088AAAACactFlg","url":"https://api.github.com/repos/rjwittams/flotilla/labels/testing","name":"testing","color":"1D76DB","default":false,"description":"Test coverage and testing infrastructure"}],"state":"open","locked":false,"assignees":[],"milestone":null,"comments":0,"created_at":"2026-03-07T02:17:38Z","updated_at":"2026-03-07T02:17:38Z","closed_at":null,"assignee":null,"author_association":"OWNER","active_lock_reason":null,"sub_issues_summary":{"total":0,"completed":0,"percent_completed":0},"issue_dependencies_summary":{"blocked_by":0,"total_blocked_by":0,"blocking":0,"total_blocking":0},"body":"## Context\n\nBoth \\`tmux.rs\\` (465 lines) and \\`zellij.rs\\` (491 lines) already have solid test suites covering:\n- TOML serialization round-trip\n- State path construction\n- Pure helper functions (split_flag, append_command_args)\n- Pruning logic\n\n**Not yet tested**: The async \\`WorkspaceManager\\` trait methods that shell out to tmux/zellij.\n\n## What to test\n\n### With CommandRunner (post #73)\n- \\`list()\\` — parse tmux/zellij output into workspace panels\n- \\`create()\\` — correct command sequence for new workspace\n- \\`focus()\\` — correct focus commands\n- Error handling when tool not available\n\n### Without CommandRunner (can do now)\n- State file migration / upgrade paths\n- More edge cases in TOML parsing\n- Pruning with complex workspace trees\n- Tab counting edge cases\n\n## Difficulty\n\n**Easy** (extending existing pure tests) to **Medium** (async methods with CommandRunner).","closed_by":null,"reactions":{"url":"https://api.github.com/repos/rjwittams/flotilla/issues/91/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/rjwittams/flotilla/issues/91/timeline","performed_via_github_app":null,"state_reason":null,"pinned_comment":null},{"url":"https://api.github.com/repos/rjwittams/flotilla/issues/90","repository_url":"https://api.github.com/repos/rjwittams/flotilla","labels_url":"https://api.github.com/repos/rjwittams/flotilla/issues/90/labels{/name}","comments_url":"https://api.github.com/repos/rjwittams/flotilla/issues/90/comments","events_url":"https://api.github.com/repos/rjwittams/flotilla/issues/90/events","html_url":"https://github.com/rjwittams/flotilla/issues/90","id":4037022141,"node_id":"I_kwDORel_087woBG9","number":90,"title":"test: GitHub code_review and issue_tracker with mock GhApi","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://