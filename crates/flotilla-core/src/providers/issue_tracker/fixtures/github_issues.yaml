T02:17:08Z","updated_at":"2026-03-07T02:17:08Z","closed_at":null,"assignee":null,"author_association":"OWNER","active_lock_reason":null,"sub_issues_summary":{"total":0,"completed":0,"percent_completed":0},"issue_dependencies_summary":{"blocked_by":0,"total_blocked_by":0,"blocking":0,"total_blocking":0},"body":"## Context\n\n- \\`providers/vcs/git.rs\\` (157 lines) — 0% coverage. Implements \\`Vcs\\` trait, shells out to \\`git\\`.\n- \\`providers/vcs/wt.rs\\` (182 lines) — 0% coverage. Implements \\`CheckoutManager\\`, shells out to \\`wt\\`.\n\nBoth use \\`run_cmd()\\` for all external calls.\n\n## Prerequisites\n\n- #73 (CommandRunner trait)\n\n## What to test\n\n### git.rs\n- \\`resolve_repo_root()\\` — parses git rev-parse output\n- \\`branches()\\` — parses branch list with ahead/behind info\n- \\`remote_branches()\\` — filters remote branch output\n- \\`log()\\` — parses git log output\n- \\`unpushed_count()\\` — parses rev-list count\n- \\`working_tree_status()\\` — parses porcelain status\n- Error handling for each command failure\n\n### wt.rs\n- \\`checkouts()\\` — parses \\`wt list --format=json\\` output\n- \\`strip_to_json()\\` — handles wt output format quirks\n- \\`switch()\\` — correct args passed\n- \\`remove()\\` — correct cleanup sequence\n- Error handling\n\n## Approach\n\nWith CommandRunner trait, provide canned stdout/stderr for each git/wt command. Test the parsing and error handling logic.\n\n## Difficulty\n\n**Medium-Hard** — depends on CommandRunner trait. Good coverage payoff once available.","closed_by":null,"reactions":{"url":"https://api.github.com/repos/rjwittams/flotilla/issues/89/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/rjwittams/flotilla/issues/89/timeline","performed_via_github_app":null,"state_reason":null,"pinned_comment":null},{"url":"https://api.github.com/repos/rjwittams/flotilla/issues/87","repository_url":"https://api.github.com/repos/rjwittams/flotilla","labels_url":"https://api.github.com/repos/rjwittams/flotilla/issues/87/labels{/name}","comments_url":"https://api.github.com/repos/rjwittams/flotilla/issues/87/comments","events_url":"https://api.github.com/repos/rjwittams/flotilla/issues/87/events","html_url":"https://github.com/rjwittams/flotilla/issues/87","id":4037020374,"node_id":"I_kwDORel_087woArW","number":87,"title":"test: TUI executor result handling and command routing","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"labels":[{"id":10364863894,"node_id":"LA_kwDORel_088AAAACactFlg","url":"https://api.github.com/repos/rjwittams/flotilla/labels/testing","name":"testing","color":"1D76DB","default":false,"description":"Test coverage and testing infrastructure"}],"state":"open","locked":false,"assignees":[],"milestone":null,"comments":0,"created_at":"2026-03-07T02:16:49Z","updated_at":"2026-03-07T02:16:49Z","closed_at":null,"assignee":null,"author_association":"OWNER","active_lock_reason":null,"sub_issues_summary":{"total":0,"completed":0,"percent_completed":0},"issue_dependencies_summary":{"blocked_by":0,"total_blocked_by":0,"blocking":0,"total_blocking":0},"body":"## Context\n\n`crates/flotilla-tui/src/app/executor.rs` (69 lines) has **0% test coverage**. It contains:\n- `execute()` — routes commands to daemon handle (async)\n- `handle_result()` — interprets `CommandResult` into UI state changes (mostly pure)\n\n## What to test\n\n### handle_result() (pure, easy)\n- `WorktreeCreated` → logs info\n- `BranchNameGenerated` → calls `prefill_branch_input()`\n- `DeleteInfo` → sets UI mode to `DeleteConfirm`\n- `Error` → sets status message\n\n### execute() (needs mock DaemonHandle)\n- `AddRepo`/`RemoveRepo` → calls daemon add/remove\n- `Refresh` → calls daemon refresh\n- Other commands → calls `daemon.execute()` with repo root\n\n## Approach\n\nThe `DaemonHandle` trait is already defined in `flotilla-core/src/daemon.rs`. Create a mock implementation that records calls.\n\n## Difficulty\n\n**Medium** — `handle_result()` is easy; `execute()` needs a mock DaemonHandle.","closed_by":null,"reactions":{"url":"https://api.github.com/repos/rjwittams/flotilla/issues/87/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/rjwittams/flotilla/issues/87/timeline","performed_via_github_app":null,"state_reason":null,"pinned_comment":null},{"url":"https://api.github.com/repos/rjwittams/flotilla/issues/64","repository_url":"https://api.github.com/repos/rjwittams/flotilla","labels_url":"https://api.github.com/repos/rjwittams/flotilla/issues/64/labels{/name}","comments_url":"https://api.github.com/repos/rjwittams/flotilla/issues/64/comments","events_url":"https://api.github.com/repos/rjwittams/flotilla/issues/64/events","html_url":"https://github.com/rjwittams/flotilla/issues/64","id":4036673898,"node_id":"I_kwDORel_087wmsFq","number":64,"title":"Splash screen audio","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"labels":[],"state":"open","locked":false,"assignees":[],"milestone":null,"comments":0,"created_at":"2026-03-06T23:45:57Z","updated_at":"2026-03-06T23:45:57Z","closed_at":null,"assignee":null,"author_association":"OWNER","active_lock_reason":null,"sub_issues_summary":{"total":0,"completed":0,"percent_completed":0},"issue_dependencies_summary":{"blocked_by":0,"total_blocked_by":0,"blocking":0,"total_blocking":0},"body":"Add audio to the splash screen for atmosphere.\n\n## Approach\n\n- Use `rodio` with MP3 format (universal browser + native support, patents expired)\n- Feature-flagged as `audio` (on by default), so it can be disabled with `--no-default-features` for those who want a silent/minimal build\n- Assets embedded in the binary via `include_bytes!`\n\n## Audio design\n\n- ~2 random seconds into a ~60s looping atmosphere track\n- One of 3 voice clips mixed on top, picked randomly — so each play feels slightly different\n\n## Asset format: MP3\n\nMP3 chosen over OGG Vorbis because:\n- Universal browser support (Chrome, Safari, Firefox)\n- Means audio assets can be shared between the TUI binary and any future web frontend\n- rodio supports it via the `mp3` feature\n- No patent concerns anymore\n\n## Things to brainstorm / consider\n\n- Appropriate bitrates (e.g. ~128kbps voice, ~96kbps atmosphere)\n- Whether the random offset into the loop needs any crossfade/fade-in to avoid a hard start\n- Volume balance between atmosphere and voice\n- Whether to fade out on splash exit or cut immediately","closed_by":null,"reactions":{"url":"https://api.github.com/repos/rjwittams/flotilla/issues/64/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/rjwittams/flotilla/issues/64/timeline","performed_via_github_app":null,"state_reason":null,"pinned_comment":null},{"url":"https://api.github.com/repos/rjwittams/flotilla/issues/63","repository_url":"https://api.github.com/repos/rjwittams/flotilla","labels_url":"https://api.github.com/repos/rjwittams/flotilla/issues/63/labels{/name}","comments_url":"https://api.github.com/repos/rjwittams/flotilla/issues/63/comments","events_url":"https://api.github.com/repos/rjwittams/flotilla/issues/63/events","html_url":"https://github.com/rjwittams/flotilla/issues/63","id":4036664420,"node_id":"I_kwDORel_087wmpxk","number":63,"title":"feat: project website at flotilla.work","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"labels":[],"state":"open","locked":false,"assignees":[],"milestone":null,"comments":0,"created_at":"2026-03-06T23:41:58Z","updated_at":"2026-03-06T23:41:58Z","closed_at":null,"assignee":null,"author_association":"OWNER","active_lock_reason":null,"sub_issues_summary":{"total":0,"completed":0,"percent_completed":0},"issue_dependencies_summary":{"blocked_by":0,"total_blocked_by":0,"blocking":0,"total_blocking":0},"body":"Set up a basic project website at `flotilla.work` using GitHub Pages.\n\n## Tasks\n\n- [ ] Configure DNS (GoDaddy) — A records pointing to GitHub Pages IPs, or CNAME for www\n- [ ] Enable custom domain in repo Settings → Pages\n- [ ] Add a static site generator (Astro or similar) — keep it simple\n- [ ] Landing page with project description, screenshot, install instructions\n- [ ] Integrate with existing Pages content (coverage report lives at `/coverage/`)\n\n## Notes\n\nDomain `flotilla.work` is already registered on GoDaddy. The coverage workflow already deploys to GitHub Pages under `/coverage/`, so the site generator will need to merge its output with other Pages artifacts (see note in `coverage.yml`).","closed_by":null,"reactions":{"url":"https://api.github.com/repos/rjwittams/flotilla/issues/63/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/rjwittams/flotilla/issues/63/timeline","performed_via_github_app":null,"state_reason":null,"pinned_comment":null},{"url":"https://api.github.com/repos/rjwittams/flotilla/issues/58","repository_url":"https://api.github.com/repos/rjwittams/flotilla","labels_url":"https://api.github.com/repos/rjwittams/flotilla/issues/58/labels{/name}","comments_url":"https://api.github.com/repos/rjwittams/flotilla/issues/58/comments","events_url":"https://api.github.com/repos/rjwittams/flotilla/issues/58/events","html_url":"https://github.com/rjwittams/flotilla/issues/58","id":4036157948,"node_id":"I_kwDORel_087wkuH8","number":58,"title":"feat: intent execution as DAG with partial-failure UI","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"labels":[],"state":"open","locked":false,"assignees":[],"milestone":null,"comments":0,"created_at":"2026-03-06T21:02:07Z","updated_at":"2026-03-06T21:02:07Z","closed_at":null,"assignee":null,"author_association":"OWNER","active_lock_reason":null,"sub_issues_summary":{"total":0,"completed":0,"percent_completed":0},"issue_dependencies_summary":{"blocked_by":0,"total_blocked_by":0,"blocking":0,"total_blocking":0},"body":"## Summary\n\nCurrently, complex intents (like CreateWorktree) execute a chain of operations — checkout creation, issue linking, workspace setup — but report a single success/failure result. If a late step fails (e.g. workspace creation), the early steps have already succeeded, and the user sees either a misleading success or a confusing error.\n\n## Problem\n\nIn `executor.rs`, `CreateWorktree` creates the checkout, writes issue links, then creates the workspace. If workspace creation fails, the worktree still exists but `WorktreeCreated` is returned — the user has no visibility into the workspace failure. Similarly, `TeleportSession` chains checkout lookup/creation with workspace creation.\n\nThis is a general pattern: an Intent maps to a sequence of provider calls where each step may independently succeed or fail, and the operation may be \"half done\" from a previous attempt.\n\n## Proposed Direction\n\nModel intent execution as a DAG of requirements rather than a flat sequence:\n- Each step declares what it needs and what it produces\n- Steps that already succeeded (e.g. worktree already exists) can be skipped\n- Partial failures are captured per-step\n- UI shows which steps completed, which failed, and which are pending\n- Re-executing an intent resumes from where it left off\n\nThis would also clean up the current pattern where the executor has to handle \"worktree already exists\" vs \"need to create\" logic inline.\n\n## Current Impact\n\n- Workspace creation failure after successful checkout is silently logged but not shown to the user\n- Follow-up actions may fail confusingly because the workspace is missing\n- No way to retry just the failed step\n\nFound during review of #46.","closed_by":null,"reactions":{"url":"https://api.github.com/repos/rjwittams/flotilla/issues/58/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/rjwittams/flotilla/issues/58/timeline","performed_via_github_app":null,"state_reason":null,"pinned_comment":null},{"url":"https://api.github.com/repos/rjwittams/flotilla/issues/56","repository_url":"https://api.github.com/repos/rjwittams/flotilla","labels_url":"https://api.github.com/repos/rjwittams/flotilla/issues/56/labels{/name}","comments_url":"https://api.github.com/repos/rjwittams/flotilla/issues/56/comments","events_url":"https://api.github.com/repos/rjwittams/flotilla/issues/56/events","html_url":"https://github.com/rjwittams/flotilla/issues/56","id":4036097572,"node_id":"I_kwDORel_087wkfYk","number":56,"title":"AI delegation: OpenAI and generic LLM API support","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"labels":[{"id":10346444324,"node_id":"LA_kwDORel_088AAAACaLI2JA","url":"https://api.github.com/repos/rjwittams/flotilla/labels/enhancement","name":"enhancement","color":"a2eeef","default":true,"description":"New feature or request"},{"id":10363475967,"node_id":"LA_kwDORel_088AAAACabYX_w","url":"https://api.github.com/repos/rjwittams/flotilla/labels/integration","name":"integration","color":"0E8A16","default":false,"description":"New provider or tool integration"}],"state":"open","locked":false,"assignees":[],"milestone":null,"comments":0,"created_at":"2026-03-06T20:47:03Z","updated_at":"2026-03-06T20:47:03Z","closed_at":null,"assignee":null,"author_association":"OWNER","active_lock_reason":null,"sub_issues_summary":{"total":0,"completed":0,"percent_completed":0},"issue_dependencies_summary":{"blocked_by":0,"total_blocked_by":0,"blocking":0,"total_blocking":0},"body":"Expand AI utility (small decisions like branch naming) beyond the current Claude Code shell-out.\n\nApproaches:\n- Anthropic API (direct, no CLI dependency)\n- OpenAI API (GPT-4, etc.)\n- Generic OpenAI-compatible API (ollama, local models)\n\nCurrent implementation shells out to \\`claude\\` CLI. Adding API-based providers means:\n- API key management / auth configuration\n- Minimal HTTP client for chat completions\n- Shared prompt templates across providers\n- Fallback chain (try API, fall back to CLI)\n\nThe shell-to-command approach already works and should remain as an option.","closed_by":null,"reactions":{"url":"https://api.github.com/repos/rjwittams/flotilla/issues/56/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/rjwittams/flotilla/issues/56/timeline","performed_via_github_app":null,"state_reason":null,"pinned_comment":null},{"url":"https://api.github.com/repos/rjwittams/flotilla/issues/55","repository_url":"https://api.github.com/repos/rjwittams/flotilla","labels_url":"https://api.github.com/repos/rjwittams/flotilla/issues/55/labels{/name}","comments_url":"https://api.github.com/repos/rjwittams/flotilla/issues/55/comments","events_url":"https://api.github.com/repos/rjwittams/flotilla/issues/55/events","html_url":"https://github.com/rjwittams/flotilla/issues/55","id":4036096158,"node_id":"I_kwDORel_087wkfCe","number":55,"title":"zellij workspace manager: polish and native KDL templates","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://a