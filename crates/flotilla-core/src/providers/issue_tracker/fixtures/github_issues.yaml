  status: 200
  body: '[{"url":"https://api.github.com/repos/rjwittams/flotilla/issues/152","repository_url":"https://api.github.com/repos/rjwittams/flotilla","labels_url":"https://api.github.com/repos/rjwittams/flotilla/issues/152/labels{/name}","comments_url":"https://api.github.com/repos/rjwittams/flotilla/issues/152/comments","events_url":"https://api.github.com/repos/rjwittams/flotilla/issues/152/events","html_url":"https://github.com/rjwittams/flotilla/issues/152","id":4045248518,"node_id":"I_kwDORel_087xHZgG","number":152,"title":"Add integration tests for concurrent daemon spawn locking","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"labels":[{"id":10347495064,"node_id":"LA_kwDORel_088AAAACaMI-mA","url":"https://api.github.com/repos/rjwittams/flotilla/labels/from-review","name":"from-review","color":"BFD4F2","default":false,"description":"Issue filed from PR review feedback"}],"state":"open","locked":false,"assignees":[],"milestone":null,"comments":0,"created_at":"2026-03-09T12:14:27Z","updated_at":"2026-03-09T12:14:27Z","closed_at":null,"assignee":null,"author_association":"OWNER","active_lock_reason":null,"sub_issues_summary":{"total":0,"completed":0,"percent_completed":0},"issue_dependencies_summary":{"blocked_by":0,"total_blocked_by":0,"blocking":0,"total_blocking":0},"body":"From PR #151 review: `connect_or_spawn` has no direct integration test coverage for concurrent launcher races and lock-failure paths. Confidence in the flock-based locking is based on code inspection and the existing test suite passing.\n\nWorth adding:\n- Two concurrent launchers racing to spawn — verify only one daemon starts\n- Lock-open failure path (e.g. permissions) — verify error surfaces cleanly\n- Loser path — verify it blocks, then connects to the winner''s daemon\n\nContext: #104, PR #151","closed_by":null,"reactions":{"url":"https://api.github.com/repos/rjwittams/flotilla/issues/152/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/rjwittams/flotilla/issues/152/timeline","performed_via_github_app":null,"state_reason":null,"pinned_comment":null},{"url":"https://api.github.com/repos/rjwittams/flotilla/issues/150","repository_url":"https://api.github.com/repos/rjwittams/flotilla","labels_url":"https://api.github.com/repos/rjwittams/flotilla/issues/150/labels{/name}","comments_url":"https://api.github.com/repos/rjwittams/flotilla/issues/150/comments","events_url":"https://api.github.com/repos/rjwittams/flotilla/issues/150/events","html_url":"https://github.com/rjwittams/flotilla/issues/150","id":4045020448,"node_id":"I_kwDORel_087xGh0g","number":150,"title":"feat: show pending action indicator on work item rows","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"labels":[],"state":"open","locked":false,"assignees":[],"milestone":null,"comments":0,"created_at":"2026-03-09T11:25:36Z","updated_at":"2026-03-09T11:25:36Z","closed_at":null,"assignee":null,"author_association":"OWNER","active_lock_reason":null,"sub_issues_summary":{"total":0,"completed":0,"percent_completed":0},"issue_dependencies_summary":{"blocked_by":0,"total_blocked_by":0,"blocking":0,"total_blocking":0},"body":"## Problem\n\nWhen performing actions on work items (especially destructive ones like archive session or remove worktree), there''s no visual feedback on the affected row. The user submits the action and has to wait for the next refresh cycle to see the item disappear, with no indication that anything is happening.\n\n## Expected behavior\n\nAfter triggering an action on a work item, show an inline indicator on that row until the item is removed by the next refresh. For example:\n\n- Spinner or `⏳` on the row while the action is in flight\n- Strikethrough or dimmed styling once the action succeeds but the item hasn''t been removed from the view yet\n- Error indicator if the action fails\n\nThis is especially important for destructive actions (remove worktree, archive session, delete branch) where the user needs confidence the action was received and is being processed.\n\n## Design considerations\n\n- The indicator is purely TUI-side state — track which `WorkItemIdentity` values have pending actions in `RepoUiState`\n- Clear the pending state when the item disappears from the next snapshot, or on error\n- Could reuse the existing `multi_selected` set pattern — a `pending_actions: HashMap<WorkItemIdentity, PendingAction>` with status enum (InFlight, Succeeded, Failed)\n- Rendering: the row''s style or a leading column character changes based on pending state\n- Related to async command progress work (see `docs/plans/2026-03-09-async-command-progress-plan.md`)","closed_by":null,"reactions":{"url":"https://api.github.com/repos/rjwittams/flotilla/issues/150/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/rjwittams/flotilla/issues/150/timeline","performed_via_github_app":null,"state_reason":null,"pinned_comment":null},{"url":"https://api.github.com/repos/rjwittams/flotilla/issues/146","repository_url":"https://api.github.com/repos/rjwittams/flotilla","labels_url":"https://api.github.com/repos/rjwittams/flotilla/issues/146/labels{/name}","comments_url":"https://api.github.com/repos/rjwittams/flotilla/issues/146/comments","events_url":"https://api.github.com/repos/rjwittams/flotilla/issues/146/events","html_url":"https://github.com/rjwittams/flotilla/issues/146","id":4044127045,"node_id":"I_kwDORel_087xDHtF","number":146,"title":"feat: cancellable long-running commands","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"labels":[],"state":"open","locked":false,"assignees":[],"milestone":null,"comments":0,"created_at":"2026-03-09T08:25:07Z","updated_at":"2026-03-09T08:25:07Z","closed_at":null,"assignee":null,"author_association":"OWNER","active_lock_reason":null,"sub_issues_summary":{"total":0,"completed":0,"percent_completed":0},"issue_dependencies_summary":{"blocked_by":0,"total_blocked_by":0,"blocking":0,"total_blocking":0},"body":"## Summary\n\nWith #143 (async command execution), long-running commands now execute in the background with `CommandStarted`/`CommandFinished` lifecycle events. However, there is no way to cancel a command once started.\n\n## Problem\n\nSeveral commands involve external API calls that can take seconds to complete:\n- `GenerateBranchName` — calls Claude API for AI-generated branch names\n- `ArchiveSession` / `ResumeSession` — Claude session management\n- `CreateWorkspaceForCheckout` — may chain multiple provider calls\n- `TeleportSession` — checkout + workspace creation\n\nIf the user changes their mind or the operation hangs, they have no recourse other than waiting for the timeout or restarting the app.\n\n## Proposed Direction\n\n- Add a `CancellationToken` (or `tokio::sync::CancellationToken`) per spawned command, keyed by the command ID returned from `execute()`\n- Add `DaemonHandle::cancel(command_id: u64)` method\n- Broadcast a `CommandCancelled { command_id, repo }` event on cancellation\n- TUI: allow cancelling in-flight commands (e.g. `Esc` while a command is in progress)\n- Provider implementations pass the token to cancellable operations (HTTP clients, subprocess spawns)\n\n## Relationship to other issues\n\n- Built on top of #143 (async command execution with lifecycle events)\n- Complements #58 (DAG-based intent execution) — DAG steps should also be individually cancellable","closed_by":null,"reactions":{"url":"https://api.github.com/repos/rjwittams/flotilla/issues/146/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/rjwittams/flotilla/issues/146/timeline","performed_via_github_app":null,"state_reason":null,"pinned_comment":null},{"url":"https://api.github.com/repos/rjwittams/flotilla/issues/145","repository_url":"https://api.github.com/repos/rjwittams/flotilla","labels_url":"https://api.github.com/repos/rjwittams/flotilla/issues/145/labels{/name}","comments_url":"https://api.github.com/repos/rjwittams/flotilla/issues/145/comments","events_url":"https://api.github.com/repos/rjwittams/flotilla/issues/145/events","html_url":"https://github.com/rjwittams/flotilla/issues/145","id":4043102065,"node_id":"I_kwDORel_087w_Ndx","number":145,"title":"Add integration test for issue refresh escalation path","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"labels":[{"id":10347495064,"node_id":"LA_kwDORel_088AAAACaMI-mA","url":"https://api.github.com/repos/rjwittams/flotilla/labels/from-review","name":"from-review","color":"BFD4F2","default":false,"description":"Issue filed from PR review feedback"}],"state":"open","locked":false,"assignees":[],"milestone":null,"comments":0,"created_at":"2026-03-09T03:23:48Z","updated_at":"2026-03-09T03:23:48Z","closed_at":null,"assignee":null,"author_association":"OWNER","active_lock_reason":null,"sub_issues_summary":{"total":0,"completed":0,"percent_completed":0},"issue_dependencies_summary":{"blocked_by":0,"total_blocked_by":0,"blocking":0,"total_blocking":0},"body":"From PR #142 review.\n\nThe escalation path in `refresh_issues_incremental` (when `changeset.has_more` is true, triggering a full cache reset + re-fetch) lacks a dedicated test. Add an integration-style test that verifies:\n\n1. When `list_issues_changed_since` returns `has_more: true`, the cache is reset\n2. A full re-fetch is triggered via `ensure_issues_cached`\n3. The timestamp is updated after the re-fetch\n4. A snapshot broadcast occurs\n\nThis would require either mocking the issue tracker or using a test harness for `InProcessDaemon`.\n\nFile: `crates/flotilla-core/src/in_process.rs`, `refresh_issues_incremental` method.","closed_by":null,"reactions":{"url":"https://api.github.com/repos/rjwittams/flotilla/issues/145/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/rjwittams/flotilla/issues/145/timeline","performed_via_github_app":null,"state_reason":null,"pinned_comment":null},{"url":"https://api.github.com/repos/rjwittams/flotilla/issues/139","repository_url":"https://api.github.com/repos/rjwittams/flotilla","labels_url":"https://api.github.com/repos/rjwittams/flotilla/issues/139/labels{/name}","comments_url":"https://api.github.com/repos/rjwittams/flotilla/issues/139/comments","events_url":"https://api.github.com/repos/rjwittams/flotilla/issues/139/events","html_url":"https://github.com/rjwittams/flotilla/issues/139","id":4042807339,"node_id":"I_kwDORel_087w-Fgr","number":139,"title":"bug: gap recovery sends replay_since for only one repo, injecting stale snapshots","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"labels":[{"id":10347495064,"node_id":"LA_kwDORel_088AAAACaMI-mA","url":"https://api.github.com/repos/rjwittams/flotilla/labels/from-review","name":"from-review","color":"BFD4F2","default":false,"description":"Issue filed from PR review feedback"}],"state":"open","locked":false,"assignees":[],"milestone":null,"comments":0,"created_at":"2026-03-09T01:34:37Z","updated_at":"2026-03-09T01:34:37Z","closed_at":null,"assignee":null,"author_association":"OWNER","active_lock_reason":null,"sub_issues_summary":{"total":0,"completed":0,"percent_completed":0},"issue_dependencies_summary":{"blocked_by":0,"total_blocked_by":0,"blocking":0,"total_blocking":0},"body":"## Problem\n\nWhen `recover_from_gap` detects a sequence gap for one repo, it sends `replay_since` with only that repo in `last_seen` (`socket.rs:327-328`). The server interprets missing repos as \"client has never seen this repo\" and sends `SnapshotFull` for all of them (`in_process.rs:854-856`).\n\nThe client forwards **all** replay events to the app (`socket.rs:364`) but only updates `local_seqs` for the target repo (`socket.rs:350,356` — guarded by `if snap.repo == repo`). Unrelated repos receive out-of-order stale full snapshots with no seq tracking update, causing false gap detection and recovery loops.\n\n## Impact\n\n- Unrelated repos get stale full snapshots on every gap recovery\n- `local_seqs` for those repos stays stale, triggering further false gap recoveries\n- Potential infinite recovery loops under certain timing conditions\n\n## Fix options\n\n1. **Client-side:** `recover_from_gap` should include all tracked repos in `last_seen`, not just the target\n2. **Client-side:** Update `local_seqs` for all repos in replay events, not just the target (remove the `if snap.repo == repo` guard)\n3. **Server-side:** Add a single-repo replay endpoint that only returns events for the requested repo\n\nOption 2 is the minimal fix. Option 1 is more correct (avoids unnecessary full snapshots).","closed_by":null,"reactions":{"url":"https://api.github.com/repos/rjwittams/flotilla/issues/139/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/rjwittams/flotilla/issues/139/timeline","performed_via_github_app":null,"state_reason":null,"pinned_comment":null},{"url":"https://api.github.com/repos/rjwittams/flotilla/issues/133","repository_url":"https://api.github.com/repos/rjwittams/flotilla","labels_url":"https://api.github.com/repos/rjwittams/flotilla/issues/133/labels{/name}","comments_url":"https://api.github.com/repos/rjwittams/flotilla/issues/133/comments","events_url":"https://api.github.com/repos/rjwittams/flotilla/issues/133/events","html_url":"https://github.com/rjwittams/flotilla/issues/133","id":4042399176,"node_id":"I_kwDORel_087w8h3I","number":133,"title":"feat: extend search to filter all work items, not just issues","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"labels":[],"state":"open","locked":false,"assignees":[],"milestone":null,"comments":0,"created_at":"2026-03-08T23:10:05Z","updated_at":"2026-03-08T23:10:05Z","closed_at":null,"assignee":null,"author_association":"OWNER","active_lock_reason":null,"sub_issues_summary":{"total":0,"completed":0,"percent_completed":0},"issue_dependencies_summary":{"blocked_by":0,"total_blocked_by":0,"blocking":0,"total_blocking":0},"body":"## Problem\n\nSearch currently only queries the GitHub issue tracker via `SearchIssues` / `ClearIssueSearch` commands. It doesn''t filter other work items in the table (worktrees, PRs, agent sessions, etc.).\n\n## Desired behavior\n\nWhen a search query is active, it should match against any correlated item on a work item:\n- **Issues**: title, number (current behavior via GitHub search API)\n- **Branches**: branch name\n- **PRs**: title, number\n- **Agent sessions**: session name/ID\n- **Worktrees**: path\n\nIf any correlated item on a `WorkItem` matches, the entire work item should remain visible.\n\n## Design considerations\n\n- **Where does filtering live?** Currently issue search is a daemon-side concept (`SearchIssues` command hits the GitHub API). Broader work item filtering could be purely TUI-side — the TUI already has the full `GroupedWorkItems` table and could filter locally by matching against item fields.\n- **Hybrid approach**: issue search could remain server-side (GitHub''s search API is richer), while the TUI adds a local filter pass over the resulting work items. A local filter would also work when the daemon is unavailable.\n- **`active_search` as protocol concept vs TUI concept**: if search is purely local filtering, it belongs in `RepoUiState`. If we want the daemon to participate (e.g. searching across providers), it becomes a protocol-level `SearchWorkItems` command.\n- **Association keys**: the correlation engine already links items via `CorrelationKey` and `AssociationKey`. Search could leverage these — if an associated issue matches, the whole correlated group stays visible.\n\n## Related\n\n- #132 (search indicator and clear UX)","closed_by":null,"reactions":{"url":"https://api.github.com/repos/rjwittams/flotilla/issues/133/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/rjwittams/flotilla/issues/133/timeline","performed_via_github_app":null,"state_reason":null,"pinned_comment":null},{"url":"https://api.github.com/repos/rjwittams/flotilla/issues/132","repository_url":"https://api.github.com/repos/rjwittams/flotilla","labels_url":"https://api.github.com/repos/rjwittams/flotilla/issues/132/labels{/name}","comments_url":"https://api.github.com/repos/rjwittams/flotilla/issues/132/comments","events_url":"https://api.github.com/repos/rjwittams/flotilla/issues/132/events","html_url":"https://github.com/rjwittams/flotilla/issues/132","id":4042397593,"node_id":"I_kwDORel_087w8heZ","number":132,"title":"feat: show active search indicator in status bar and allow clearing with Esc","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"labels":[],"state":"open","locked":false,"assignees":[],"milestone":null,"comments":0,"created_at":"2026-03-08T23:09:25Z","updated_at":"2026-03-08T23:09:25Z","closed_at":null,"assignee":null,"author_association":"OWNER","active_lock_reason":null,"sub_issues_summary":{"total":0,"completed":0,"percent_completed":0},"issue_dependencies_summary":{"blocked_by":0,"total_blocked_by":0,"blocking":0,"total_blocking":0},"body":"## Problem\n\nWhen a search is submitted, the TUI returns to Normal mode but there''s no visual indication that search results are filtering the view. The only way to clear the search is to open the search input again (`/`) and press `Esc`.\n\n## Current architecture\n\n- `UiMode::IssueSearch { input }` — transient input mode while typing a query\n- `issue_search_active: bool` on `TuiRepoModel` — set from `snap.issue_search_results.is_some()`\n- On `Esc` during input: sends `ClearIssueSearch` command and returns to Normal\n- On `Enter` during input: submits query via `SearchIssues` command and returns to Normal — but no way to clear afterwards\n\n## Proposed changes\n\n1. **Status bar indicator**: when `issue_search_active` is true in Normal mode, show the active query in the status bar (e.g. `🔍 \"query\" (Esc to clear)`)\n2. **Esc in Normal mode clears search**: when a search is active and user presses `Esc`, send `ClearIssueSearch` to the daemon\n3. **Rename `UiMode::IssueSearch` → `UiMode::SearchInput`**: the input mode is ephemeral and not issue-specific\n4. **Store `active_search_query: Option<String>` on `RepoUiState`**: so the status bar can display what was searched for (the daemon only tells us results exist, not the query)\n\n## Related\n\n- #126 (broader work item search)","closed_by":null,"reactions":{"url":"https://api.github.com/repos/rjwittams/flotilla/issues/132/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/rjwittams/flotilla/issues/132/timeline","performed_via_github_app":null,"state_reason":null,"pinned_comment":null},{"url":"https://api.github.com/repos/rjwittams/flotilla/issues/127","repository_url":"https://api.github.com/repos/rjwittams/flotilla","labels_url":"https://api.github.com/repos/rjwittams/flotilla/issues/127/labels{/name}","comments_url":"https://api.github.com/repos/rjwittams/flotilla/issues/127/comments","events_url":"https://api.github.com/repos/rjwittams/flotilla/issues/127/events","html_url":"https://github.com/rjwittams/flotilla/issues/127","id":4042234494,"node_id":"I_kwDORel_087w75p-","number":127,"title":"test: add capturing MockRunner to verify command args in executor tests","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"labels":[{"id":10364863894,"node_id":"LA_kwDORel_088AAAACactFlg","url":"https://api.github.com/repos/rjwittams/flotilla/labels/testing","name":"testing","color":"1D76DB","default":false,"description":"Test coverage and testing infrastructure"}],"state":"open","locked":false,"assignees":[],"milestone":null,"comments":1,"created_at":"2026-03-08T21:36:58Z","updated_at":"2026-03-08T22:39:02Z","closed_at":null,"assignee":null,"author_association":"OWNER","active_lock_reason":null,"sub_issues_summary":{"total":0,"completed":0,"percent_completed":0},"issue_dependencies_summary":{"blocked_by":0,"total_blocked_by":0,"blocking":0,"total_blocking":0},"body":"## Context\n\nFrom code review of PR #126 (executor.rs tests): the current `MockRunner` in `providers/mod.rs` pops canned responses without recording what commands/args were passed. This means several tests verify only that the code path succeeds, not that the correct commands were issued:\n\n- `create_checkout_with_issue_ids_writes_git_config` — doesn''t verify `git config` args\n- `link_issues_success_with_existing_body` / `link_issues_success_with_empty_body` — don''t verify `gh pr edit` body content\n- `teleport_session_uses_session_as_name_when_no_branch` — doesn''t verify the name passed\n\n## Proposal\n\nAdd a capturing/spy variant of `MockRunner` that records `(cmd, args, cwd)` for each invocation. Tests can then assert the exact commands issued. This would also benefit future provider tests (#89, #90, #91, #92).\n\n## Related\n\n- PR #126 (test: data.rs and executor.rs coverage)\n- #83 (executor.rs tests)\n- #73 (CommandRunner trait)","closed_by":null,"reactions":{"url":"https://api.github.com/repos/rjwittams/flotilla/issues/127/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/rjwittams/flotilla/issues/127/timeline","performed_via_github_app":null,"state_reason":null,"pinned_comment":null},{"url":"https://api.github.com/repos/rjwittams/flotilla/issues/124","repository_url":"https://api.github.com/repos/rjwittams/flotilla","labels_url":"https://api.github.com/repos/rjwittams/flotilla/issues/124/labels{/name}","comments_url":"https://api.github.com/repos/rjwittams/flotilla/issues/124/comments","events_url":"https://api.github.com/repos/rjwittams/flotilla/issues/124/events","html_url":"https://github.com/rjwittams/flotilla/issues/124","id":4042163307,"node_id":"I_kwDORel_087w7oRr","number":124,"title":"fix: cmux access denied in daemon mode after TUI exit","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"labels":[],"state":"open","locked":false,"assignees":[],"milestone":null,"comments":1,"created_at":"2026-03-08T20:59:39Z","updated_at":"2026-03-08T21:02:41Z","closed_at":null,"assignee":null,"author_association":"OWNER","active_lock_reason":null,"sub_issues_summary":{"total":0,"completed":0,"percent_completed":0},"issue_dependencies_summary":{"blocked_by":0,"total_blocked_by":0,"blocking":0,"total_blocking":0},"body":"## Problem\n\nIn daemon mode, cmux workspace commands fail with:\n- \"Access denied — only processes started inside cmux can connect\"\n\nThis works fine in embedded mode.\n\n## Root cause\n\ncmux validates socket connections by walking the process tree (`isDescendant`) to verify the connecting process is a descendant of the cmux app process.\n\nThe flotilla daemon is spawned by the TUI with `setsid()` to detach it. While the ancestry chain is initially intact (daemon → TUI → shell → cmux), once the TUI process exits, the daemon is reparented to PID 1 (`launchd`). On subsequent TUI launches that reconnect to the existing daemon, cmux''s ancestry check fails because the daemon is no longer a descendant of cmux.\n\n## Possible approaches\n\n1. **Route cmux commands back to the TUI** — the daemon could delegate workspace provider calls back to the connected TUI client (which *is* a cmux descendant), rather than calling cmux directly from the daemon process.\n\n2. **Use a cmux socket password/auth token** — if cmux supports an alternative authentication mechanism (e.g., `CMUX_SOCKET_PASSWORD`), the daemon could use that instead of relying on process ancestry.\n\n3. **Don''t detach the daemon from cmux''s process tree** — avoid `setsid()` or find an alternative way to prevent Ctrl-C from killing the daemon without breaking the ancestry chain.\n\n## Context\n\n- cmux ancestry check: `TerminalController.swift:395` — `isDescendant()` walks parent PIDs via `sysctl`\n- flotilla daemon spawn: `src/main.rs` — `connect_or_spawn()` uses `setsid()` in `pre_exec`\n- cmux CLI socket: connects to `/tmp/cmux.sock` (or `CMUX_SOCKET_PATH`)","closed_by":null,"reactions":{"url":"https://api.github.com/repos/rjwittams/flotilla/issues/124/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/rjwittams/flotilla/issues/124/timeline","performed_via_github_app":null,"state_reason":null,"pinned_comment":null},{"url":"https://api.github.com/repos/rjwittams/flotilla/issues/123","repository_url":"https://api.github.com/repos/rjwittams/flotilla","labels_url":"https://api.github.com/repos/rjwittams/flotilla/issues/123/labels{/name}","comments_url":"https://api.github.com/repos/rjwittams/flotilla/issues/123/comments","events_url":"https://api.github.com/repos/rjwittams/flotilla/issues/123/events","html_url":"https://github.com/rjwittams/flotilla/issues/123","id":4042059442,"node_id":"I_kwDORel_087w7O6y","number":123,"title":"Add integration test for linked issue pinning flow","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"labels":[{"id":10347495064,"node_id":"LA_kwDORel_088AAAACaMI-mA","url":"https://api.github.com/repos/rjwittams/flotilla/labels/from-review","name":"from-review","color":"BFD4F2","default":false,"description":"Issue filed from PR review feedback"}],"state":"open","locked":false,"assignees":[],"milestone":null,"comments":0,"created_at":"2026-03-08T20:01:34Z","updated_at":"2026-03-08T20:01:34Z","closed_at":null,"assignee":null,"author_association":"OWNER","active_lock_reason":null,"sub_issues_summary":{"total":0,"completed":0,"percent_completed":0},"issue_dependencies_summary":{"blocked_by":0,"total_blocked_by":0,"blocking":0,"total_blocking":0},"body":"From PR #122 review by @claude[bot]: https://github.com/rjwittams/flotilla/pull/122#issuecomment-4019864048\n\nThe async wiring in `fetch_missing_linked_issues` (two-phase lock pattern, broadcast-after-pin path) has no test coverage beyond the unit tests in `issue_cache.rs`.\n\nAdd an integration test with a mock `IssueTracker` that:\n1. Returns checkouts/CRs with `AssociationKey::IssueRef` pointing to an issue ID\n2. Returns that issue from `fetch_issues_by_id`\n3. Verifies the subsequent snapshot contains the pinned issue\n\nContext: The lock choreography (read → fetch → write → broadcast) and mutex serialization are the parts most likely to have subtle bugs.","closed_by":null,"reactions":{"url":"https://api.github.com/repos/rjwittams/flotilla/issues/123/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/rjwittams/flotilla/issues/123/timeline","performed_via_github_app":null,"state_reason":null,"pinned_comment":null},{"url":"https://api.github.com/repos/rjwittams/flotilla/issues/120","repository_url":"https://api.github.com/repos/rjwittams/flotilla","labels_url":"https://api.github.com/repos/rjwittams/flotilla/issues/120/labels{/name}","comments_url":"https://api.github.com/repos/rjwittams/flotilla/issues/120/comments","events_url":"https://api.github.com/repos/rjwittams/flotilla/issues/120/events","html_url":"https://github.com/rjwittams/flotilla/issues/120","id":4041247087,"node_id":"I_kwDORel_087w4Ilv","number":120,"title":"feat: record/replay test harness for daemon and TUI","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"labels":[],"state":"open","locked":false,"assignees":[],"milestone":null,"comments":0,"created_at":"2026-03-08T12:57:16Z","updated_at":"2026-03-08T12:57:16Z","closed_at":null,"assignee":null,"author_association":"OWNER","active_lock_reason":null,"sub_issues_summary":{"total":0,"completed":0,"percent_completed":0},"issue_dependencies_summary":{"blocked_by":0,"total_blocked_by":0,"blocking":0,"total_blocking":0},"body":"## Summary\n\nThe daemon/TUI split via `DaemonHandle` and `CommandRunner` traits creates natural seams for record/replay testing:\n\n- **Daemon side**: Record `CommandRunner` CLI outputs during a real session, replay them to test issue caching, correlation, refresh logic, etc. without hitting GitHub/git.\n- **TUI side**: Record the `DaemonEvent` stream and `CommandResult` responses, replay them to test rendering, input handling, and state transitions without live providers.\n\nBoth sides get deterministic, reproducible test harnesses from the existing architecture.\n\n## Approach\n\n- Serialize events/commands/responses at the protocol boundary (already serde-compatible)\n- Recording wrapper around `CommandRunner` / `DaemonHandle` to capture sessions\n- Replay implementations that feed recorded data back\n- Could also enable golden-file snapshot testing for UI output","closed_by":null,"reactions":{"url":"https://api.github.com/repos/rjwittams/flotilla/issues/120/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/rjwittams/flotilla/issues/120/timeline","performed_via_github_app":null,"state_reason":null,"pinned_comment":null},{"url":"https://api.github.com/repos/rjwittams/flotilla/issues/114","repository_url":"https://api.github.com/repos/rjwittams/flotilla","labels_url":"https://api.github.com/repos/rjwittams/flotilla/issues/114/labels{/name}","comments_url":"https://api.github.com/repos/rjwittams/flotilla/issues/114/comments","events_url":"https://api.github.com/repos/rjwittams/flotilla/issues/114/events","html_url":"https://github.com/rjwittams/flotilla/issues/114","id":4038642842,"node_id":"I_kwDORel_087wuMya","number":114,"title":"issue search results should not be in shared Snapshot","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"labels":[{"id":10347495064,"node_id":"LA_kwDORel_088AAAACaMI-mA","url":"https://api.github.com/repos/rjwittams/flotilla/labels/from-review","name":"from-review","color":"BFD4F2","default":false,"description":"Issue filed from PR review feedback"}],"state":"open","locked":false,"assignees":[],"milestone":null,"comments":1,"created_at":"2026-03-07T14:47:47Z","updated_at":"2026-03-07T15:02:02Z","closed_at":null,"assignee":null,"author_association":"OWNER","active_lock_reason":null,"sub_issues_summary":{"total":0,"completed":0,"percent_completed":0},"issue_dependencies_summary":{"blocked_by":0,"total_blocked_by":0,"blocking":0,"total_blocking":0},"body":"From PR #107 review (claude-review):\n\n`issue_search_results: Option<Vec<Issue>>` is a field on the shared `Snapshot`, but search state is per-client. One client''s search results would clobber another client''s view in multi-client mode.\n\nRecommended fix: route search results as a direct `CommandResult` to the requesting client. This fits the existing request/response model and avoids per-client overlay in the protocol.\n\nShould be resolved before issue fetching implementation starts.","closed_by":null,"reactions":{"url":"https://api.github.com/repos/rjwittams/flotilla/issues/114/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confu