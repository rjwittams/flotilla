rounds:
- interactions:
  - channel: command
    cmd: tmux
    args:
    - display-message
    - '-p'
    - '#{session_name}'
    cwd: '.'
    stdout: |
      flotilla-test-tmux
    exit_code: 0
  - channel: command
    cmd: tmux
    args:
    - display-message
    - '-p'
    - '#{start_time}'
    cwd: '.'
    stdout: |
      1774536898
    exit_code: 0
  - channel: command
    cmd: tmux
    args:
    - list-windows
    - '-F'
    - "#{window_id}\t#{window_name}"
    cwd: '.'
    stdout: "@0\tmain-work\n@1\tfeature-branch\n"
    exit_code: 0
