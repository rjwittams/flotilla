rounds:
- interactions:
  - channel: command
    cmd: zellij
    args:
    - action
    - new-tab
    - '--name'
    - feat-123
    - '--cwd'
    - /tmp
    cwd: '.'
    stdout: |
      1
    exit_code: 0
  - channel: command
    cmd: zellij
    args:
    - action
    - write-chars
    - |
      {main_command}
    cwd: '.'
    stdout: ''
    exit_code: 0
  - channel: command
    cmd: zellij
    args:
    - action
    - new-tab
    - '--name'
    - fix-456
