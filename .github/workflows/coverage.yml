name: Nightly

on:
  schedule:
    - cron: "0 6 * * *" # daily at 06:00 UTC
  workflow_dispatch: # allow manual runs

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: nightly
  cancel-in-progress: true

jobs:
  check-changes:
    name: Check for changes
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          elif git diff --quiet HEAD~1 -- '**/*.rs' '**/Cargo.toml' 'Cargo.*'; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

  coverage:
    name: Coverage
    needs: check-changes
    if: needs.check-changes.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-coverage-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-coverage-
      - name: Generate coverage report
        run: |
          # NOTE: --branch crashes llvm-cov (SIGSEGV from --show-mcdc in nightly LLVM).
          # Revisit when upstream is fixed.
          cargo +nightly llvm-cov --workspace --html --locked --remap-path-prefix
          cargo +nightly llvm-cov --workspace --json --no-run --locked --output-path target/llvm-cov/html/coverage.json
      - name: Add badge JSON
        run: |
          PERCENT=$(jq -r '.data[0].totals.lines.percent | floor' target/llvm-cov/html/coverage.json)
          if [ -z "$PERCENT" ]; then PERCENT="0"; fi
          COLOR="red"
          if awk "BEGIN{exit!($PERCENT>=80)}"; then COLOR="brightgreen"
          elif awk "BEGIN{exit!($PERCENT>=60)}"; then COLOR="yellow"
          fi
          printf '{"schemaVersion":1,"label":"coverage","message":"%s%%","color":"%s"}\n' "$PERCENT" "$COLOR" \
            > target/llvm-cov/html/badge.json
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-site
          path: target/llvm-cov/html/

  dylint:
    name: Dylint
    needs: check-changes
    if: needs.check-changes.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-03-12
          components: llvm-tools-preview, rustc-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/cargo-dylint
            ~/.cargo/bin/dylint-link
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-dylint-nightly-2026-03-12-${{ hashFiles('lints/**/Cargo.lock', 'Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-dylint-nightly-2026-03-12-
      - name: Install cargo-dylint
        run: |
          command -v cargo-dylint && command -v dylint-link || cargo install cargo-dylint dylint-link --locked
      - run: cargo dylint --all -- --all-targets
      - name: Write badge JSON
        if: always()
        run: |
          mkdir -p _badges
          if [ "${{ job.status }}" = "success" ]; then
            printf '{"schemaVersion":1,"label":"dylint","message":"passing","color":"brightgreen"}\n' > _badges/dylint.json
          else
            printf '{"schemaVersion":1,"label":"dylint","message":"failing","color":"red"}\n' > _badges/dylint.json
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dylint-badge
          path: _badges/

  deploy:
    name: Deploy to Pages
    needs: [coverage, dylint]
    if: always() && needs.coverage.result == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: coverage-site
          path: _site/coverage/
      - uses: actions/download-artifact@v4
        if: needs.dylint.result == 'success' || needs.dylint.result == 'failure'
        with:
          name: dylint-badge
          path: _site/badges/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site/
      - id: deployment
        uses: actions/deploy-pages@v4
